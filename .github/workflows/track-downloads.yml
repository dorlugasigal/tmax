name: Track Downloads

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch releases and append snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p docs
          gh api "repos/${{ github.repository }}/releases" --paginate > releases.json

          node <<'EOF'
          const fs = require('fs');
          const releases = JSON.parse(fs.readFileSync('releases.json', 'utf8'));

          const snapshot = {
            t: new Date().toISOString(),
            releases: {},
          };
          for (const r of releases) {
            snapshot.releases[r.tag_name] = {};
            for (const a of r.assets) {
              snapshot.releases[r.tag_name][a.name] = a.download_count;
            }
          }

          const path = 'docs/download-history.json';
          let history = { snapshots: [] };
          if (fs.existsSync(path)) {
            try {
              history = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (!Array.isArray(history.snapshots)) history = { snapshots: [] };
            } catch { history = { snapshots: [] }; }
          }

          // Skip write if the last snapshot is identical to the new one (no change in any count)
          const last = history.snapshots[history.snapshots.length - 1];
          const sameCounts = last && JSON.stringify(last.releases) === JSON.stringify(snapshot.releases);
          if (sameCounts) {
            console.log('No changes since last snapshot, skipping write.');
            process.exit(0);
          }

          history.snapshots.push(snapshot);
          fs.writeFileSync(path, JSON.stringify(history, null, 2) + '\n');
          console.log(`Appended snapshot for ${snapshot.t}, ${history.snapshots.length} total.`);
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/download-history.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore: download stats snapshot"
          # Main can move under us while the workflow runs. Retry push a few
          # times with rebase so the snapshot commit lands even if other
          # commits have been pushed concurrently.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected, rebasing and retrying (attempt $attempt)"
            git pull --rebase origin main
          done
          echo "Push still failing after 5 attempts; skipping this snapshot"
          exit 0
